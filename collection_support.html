<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - Support</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>

<body class="text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gradient-to-b from-[#1565C0] to-[#0D47A1] text-white flex flex-col shadow-2xl z-20 hidden md:flex flex-shrink-0">
        <div class="h-20 flex items-center gap-3 px-6 border-b border-white/10 bg-black/5">
            <div class="bg-white p-1 rounded-full shadow-inner">
                <img src="washishti milk_logo 2.png" alt="Logo" class="w-8 h-8 object-contain">
            </div>
            <span class="font-bold tracking-wide text-lg">Washishti Dairy</span>
        </div>
        
        <nav class="mt-6 px-4 space-y-2 flex-1">
            <a href="collection.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-flask w-6 text-center"></i> <span data-translate="navCollection">Milk Collection</span>
            </a>
            <a href="collectionFarmers.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-users w-6 text-center"></i> <span data-translate="navFarmers">Farmer Mgt</span>
            </a>
            <a href="collection_reports.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-chart-line w-6 text-center"></i> <span data-translate="navReports">Report & Analysis</span>
            </a>
            
            <a href="collection_support.html" class="flex items-center px-4 py-3 bg-blue-900 text-white font-bold rounded-lg shadow-inner">
                <i class="fa-solid fa-headset w-6 text-center"></i> <span data-translate="navSupport">Support</span>
            </a>
            
            <a href="collection_settings.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-gear w-6 text-center"></i> <span data-translate="navSettings">Settings</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-white/10 bg-black/5 text-center text-xs text-white/50">
            &copy; 2026 Washishti
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 lg:px-8 z-10 flex-shrink-0 sticky top-0">
            <div class="flex items-center gap-4">
                <div class="w-1 h-8 bg-[#1565C0] rounded-full hidden sm:block"></div>
                <h1 class="text-lg font-bold text-[#1565C0] italic tracking-tight hidden sm:block" data-translate="companyName">Washishti Milk & Milk Products Pvt. Ltd.</h1>
                <button class="md:hidden text-slate-500 text-2xl"><i class="fas fa-bars"></i></button>
            </div>
            
            <div class="flex items-center gap-4 sm:gap-6">
                <select id="language-toggle" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-[#1565C0] focus:border-[#1565C0] block p-2 outline-none font-medium cursor-pointer shadow-sm">
                    <option value="en">English</option>
                    <option value="mr">मराठी (Marathi)</option>
                </select>
                
                <div class="flex items-center gap-3 border-l border-slate-200 pl-4 sm:pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operator</p>
                        <p class="text-sm font-bold text-slate-700" id="header-username">Center #42</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 w-full max-w-4xl mx-auto pb-20">
            <h2 class="text-2xl font-bold text-slate-800 mb-6" data-translate="supportTitle">Center Support Helpdesk</h2>

            <div class="bg-white p-8 rounded-2xl border-y border-r border-l-4 border-l-green-500 border-y-slate-200 border-r-slate-200 shadow-sm">
                <h3 class="text-lg font-bold text-slate-800 mb-6 border-b pb-2 flex items-center gap-2" data-translate="raiseTicket">
                    <i class="fas fa-ticket-alt text-green-500"></i> Raise a Support Ticket
                </h3>
                
                <form id="supportForm" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="issueCategory">Issue Category</label>
                            <select id="supportSubject" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-[#1565C0] outline-none text-sm shadow-sm">
                                <option value="Milk Transport Delay">Milk Transport Delay</option>
                                <option value="Fat Analyzer Error">Fat Analyzer Error</option>
                                <option value="Payment Dispute">Payment Dispute</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="description">Issue Description</label>
                        <textarea id="supportMessage" rows="4" placeholder="Describe the problem here..." required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:border-[#1565C0] outline-none text-sm resize-none shadow-sm"></textarea>
                    </div>
                    
                    <div class="flex justify-end pt-2">
                        <button type="submit" id="submitSupportBtn" class="w-full md:w-auto bg-[#1565C0] hover:bg-[#0D47A1] text-white px-8 py-3 rounded-xl font-bold transition-all shadow-md flex items-center justify-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> <span data-translate="submitTicket">Submit Ticket</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('header-username').innerText = localStorage.getItem("username") || "Operator";
        });

        // SEND TICKET TO BACKEND
        document.getElementById('supportForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const btn = document.getElementById('submitSupportBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            try {
                const response = await fetch('https://washishti-api.onrender.com/api/support', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: localStorage.getItem("username"),
                        userRole: "COLLECTION_CENTER",
                        subject: document.getElementById('supportSubject').value,
                        message: document.getElementById('supportMessage').value
                    })
                });
                if (response.ok) {
                    alert("Ticket sent successfully!");
                    document.getElementById('supportMessage').value = ""; 
                }
            } catch (error) {
                alert("Server error. Cannot submit ticket.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        const translations = {
            "en": { companyName: "Washishti Milk & Milk Products Pvt. Ltd.", navCollection: "Milk Collection", navFarmers: "Farmer Mgt", navReports: "Report & Analysis", navSupport: "Support", navSettings: "Settings", supportTitle: "Center Support Helpdesk", raiseTicket: "Raise a Support Ticket", issueCategory: "Issue Category", description: "Issue Description", submitTicket: "Submit Ticket" },
            "mr": { companyName: "वाशिष्ठी दूध आणि दुग्धजन्य पदार्थ प्रा. लि.", navCollection: "दूध संकलन", navFarmers: "शेतकरी व्यवस्थापन", navReports: "अहवाल आणि विश्लेषण", navSupport: "समर्थन", navSettings: "सेटिंग्ज", supportTitle: "केंद्र समर्थन हेल्पडेस्क", raiseTicket: "समर्थन तिकीट वाढवा", issueCategory: "समस्या श्रेणी", description: "समस्येचे वर्णन", submitTicket: "तिकीट सबमिट करा" }
        };

        document.getElementById('language-toggle').addEventListener('change', function(e) {
            const lang = e.target.value;
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
            });
        });
    </script>
</body>
</html>
