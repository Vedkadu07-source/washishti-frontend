<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - Settings</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandBlue: '#1565C0', brandOrange: '#febd69', bgGray: '#f8fafc' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gradient-to-b from-brandBlue to-[#0D47A1] text-white flex flex-col shadow-2xl z-20 hidden md:flex flex-shrink-0">
        <div class="h-20 flex items-center gap-3 px-6 border-b border-white/10 bg-black/5">
            <div class="bg-white p-1 rounded-full shadow-inner"><img src="washishti milk_logo 2.png" alt="Logo" class="w-8 h-8 object-contain"></div>
            <div>
                <span class="font-bold tracking-wide text-lg leading-none block">Washishti</span>
                <span class="text-xs text-blue-200">Online Customers</span>
            </div>
        </div>

        <nav class="mt-6 px-4 space-y-2 flex-1 overflow-y-auto">
            <a href="OnlineCustomers.html" class="flex items-center gap-3 px-4 py-3 text-blue-100 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-cart-shopping w-5 text-center"></i> <span data-translate="navStore">Retail Store</span>
            </a>
            <a href="Online_profiles.html" class="flex items-center gap-3 px-4 py-3 text-blue-100 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-user w-5 text-center"></i> <span class="font-medium" data-translate="navProfile">Customer Profile</span>
            </a>
            <a href="online_myorders.html" class="flex items-center gap-3 px-4 py-3 text-blue-100 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-list-ul w-5 text-center"></i> <span class="font-medium" data-translate="navMyOrders">My Orders</span>
            </a>
            
            <div class="border-t border-white/10 my-4 mx-2"></div>

            <a href="online_reports.html" class="flex items-center gap-3 px-4 py-3 text-blue-100 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-chart-simple w-5 text-center"></i> <span class="font-medium" data-translate="navReports">Reports & Analytics</span>
            </a>
            
            <a href="online_settings.html" class="flex items-center gap-3 px-4 py-3 bg-blue-900 text-brandOrange font-semibold rounded-lg border-l-4 border-brandOrange shadow-lg transition-all duration-200">
                <i class="fa-solid fa-gear w-5 text-center"></i> <span data-translate="navSettings">Settings</span>
            </a>
            
            <a href="online_support.html" class="flex items-center gap-3 px-4 py-3 text-blue-100 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-headset w-5 text-center"></i> <span class="font-medium" data-translate="navSupport">Support</span>
            </a>
        </nav>

        <div class="p-4 mt-auto border-t border-white/10 bg-black/5">
            <button onclick="localStorage.removeItem('username'); window.location.href='login.html';" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition-colors shadow-lg shadow-red-500/30">
                <i class="fas fa-sign-out-alt"></i> <span data-translate="btnLogout">Secure Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 lg:px-8 z-10 flex-shrink-0 sticky top-0">
            <div class="flex items-center gap-4 flex-1">
                <div class="w-1 h-8 bg-brandBlue rounded-full hidden lg:block"></div>
                <h1 class="text-xl font-bold text-brandBlue italic tracking-tight hidden lg:block" data-translate="headerTitle">Washishti Account Settings</h1>
            </div>
            
            <div class="flex items-center justify-end gap-4 flex-1">
                <select id="language-toggle" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-brandBlue outline-none font-medium cursor-pointer shadow-sm p-2">
                    <option value="en">English</option>
                    <option value="mr">मराठी</option>
                </select>
                <div class="flex items-center gap-3 border-l border-slate-200 pl-4 sm:pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider" data-translate="roleText">Customer</p>
                        <p class="text-sm font-bold text-brandBlue" id="header-username">User</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-blue-50 border border-blue-200 flex items-center justify-center text-brandBlue shadow-sm">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 w-full max-w-3xl mx-auto pb-32">
            <h2 class="text-2xl font-bold text-slate-800 mb-6" data-translate="pageTitle">Preferences & Settings</h2>

            <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                
                <div>
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                        <i class="fas fa-user-edit text-brandBlue"></i> Profile Details
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Mobile Number</label>
                            <input type="text" id="updateMobile" placeholder="Enter new mobile number" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brandBlue outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Delivery Address</label>
                            <input type="text" id="updateAddress" placeholder="Enter new delivery address" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brandBlue outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2" data-translate="notifSettings">
                        <i class="fas fa-bell text-brandBlue"></i> Notifications
                    </h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="font-semibold text-slate-700" data-translate="orderUpdates">Order Tracking Updates (SMS)</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" checked class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brandBlue"></div>
                            </label>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="font-semibold text-slate-700" data-translate="promoAlerts">Promotional Offers & Discounts</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brandBlue"></div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="pt-6 flex justify-end border-t border-gray-100">
                    <button type="button" id="saveSettingsBtn" class="bg-brandBlue hover:bg-[#0D47A1] text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md flex items-center gap-2 transform hover:-translate-y-0.5">
                        <i class="fas fa-save"></i> <span data-translate="saveChanges">Save Settings</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

<script>
    // Load Username
    document.addEventListener("DOMContentLoaded", function() {
        const username = localStorage.getItem("username") || "Valued Customer";
        document.getElementById('header-username').innerText = username;
    });

    // BACKEND CONNECTION: Save Settings Logic
    document.getElementById('saveSettingsBtn').addEventListener('click', async function() {
        const mobileInput = document.getElementById('updateMobile').value.trim();
        const addressInput = document.getElementById('updateAddress').value.trim();
        const username = localStorage.getItem("username"); // Get logged-in user

        // Don't send empty updates
        if (!mobileInput && !addressInput) {
            alert("Please enter a new mobile number or address to save.");
            return;
        }

        const btn = this;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        try {
            const response = await fetch('https://washishti-api.onrender.com/api/users/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    mobile: mobileInput,
                    address: addressInput
                })
            });

            const data = await response.json();
            if (data.success) {
                alert("Settings updated successfully!");
                document.getElementById('updateMobile').value = "";
                document.getElementById('updateAddress').value = "";
            } else {
                alert("Failed to update: " + data.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });

    // Translation Logic
    const translations = {
        "en": { headerTitle: "Washishti Account Settings", navStore: "Retail Store", navProfile: "Customer Profile", navMyOrders: "My Orders", navReports: "Reports & Analytics", navSettings: "Settings", navSupport: "Support", btnLogout: "Secure Logout", roleText: "Customer", pageTitle: "Preferences & Settings", notifSettings: "Notifications", orderUpdates: "Order Tracking Updates (SMS)", promoAlerts: "Promotional Offers & Discounts", saveChanges: "Save Settings" },
        "mr": { headerTitle: "वाशिष्ठी खाते सेटिंग्ज", navStore: "रिटेल स्टोअर", navProfile: "ग्राहक प्रोफाइल", navMyOrders: "माझ्या ऑर्डर्स", navReports: "अहवाल आणि विश्लेषण", navSettings: "सेटिंग्ज", navSupport: "समर्थन", btnLogout: "सुरक्षित लॉगआउट", roleText: "ग्राहक", pageTitle: "प्राधान्ये आणि सेटिंग्ज", notifSettings: "सूचना", orderUpdates: "ऑर्डर ट्रॅकिंग अपडेट्स (SMS)", promoAlerts: "प्रचारात्मक ऑफर आणि सूट", saveChanges: "सेटिंग्ज जतन करा" }
    };
    
    document.getElementById('language-toggle').addEventListener('change', function(e) {
        const lang = e.target.value;
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
        });
    });
</script>
</body>
</html>
