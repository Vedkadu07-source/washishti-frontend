<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - Farmer Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brandBlue: '#1565C0', brandOrange: '#febd69', bgGray: '#f8fafc' } } } }
    </script>
</head>

<body class="text-slate-800 flex h-screen overflow-hidden">
    <aside class="w-64 bg-gradient-to-b from-brandBlue to-[#0D47A1] text-white flex flex-col shadow-2xl z-20 hidden md:flex flex-shrink-0">
        <div class="h-20 flex items-center gap-3 px-6 border-b border-white/10 bg-black/5">
            <div class="bg-white p-1 rounded-full shadow-inner">
                <img src="washishti milk_logo 2.png" alt="Logo" class="w-8 h-8 object-contain">
            </div>
            <span class="font-bold tracking-wide text-lg">Washishti Dairy</span>
        </div>
        <nav class="mt-6 px-4 space-y-2 flex-1 overflow-y-auto">
            <p class="px-4 text-xs font-bold text-blue-200 uppercase tracking-wider mb-2 mt-4" data-translate="menuSection">Farmer Menu</p>
            <a href="farmer_history.html" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i> <span class="font-medium" data-translate="navHistory">Milk History</span>
            </a>
            <a href="farmer_profile.html" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-user-tractor w-5 text-center"></i> <span class="font-medium" data-translate="navProfile">Farmer Profile</span>
            </a>
            <p class="px-4 text-xs font-bold text-blue-200 uppercase tracking-wider mb-2 mt-6" data-translate="menuOther">More</p>
            <a href="farmer_reports.html" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-chart-pie w-5 text-center"></i> <span class="font-medium" data-translate="navReports">Reports & Analytics</span>
            </a>
            <a href="farmer_settings.html" class="flex items-center gap-3 px-4 py-3 bg-blue-900 text-brandOrange font-semibold rounded-lg border-l-4 border-brandOrange shadow-sm transition-all duration-200">
                <i class="fa-solid fa-gear w-5 text-center"></i> <span data-translate="navSettings">Settings</span>
            </a>
            <a href="farmer_support.html" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-xl transition-all duration-200">
                <i class="fa-solid fa-headset w-5 text-center"></i> <span class="font-medium" data-translate="navSupport">Support</span>
            </a>
        </nav>
        <div class="p-4 mt-auto border-t border-white/10 bg-black/5">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition-colors shadow-lg shadow-red-500/30">
                <i class="fas fa-sign-out-alt"></i> <span data-translate="btnLogout">Secure Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 lg:px-8 z-10 flex-shrink-0 sticky top-0">
            <div class="flex items-center gap-4 flex-1">
                <div class="w-1 h-8 bg-brandBlue rounded-full hidden lg:block"></div>
                <h1 class="text-xl font-bold text-brandBlue italic tracking-tight hidden lg:block" data-translate="headerTitle">Washishti Farmer Settings</h1>
            </div>
            <div class="flex items-center justify-end gap-4 sm:gap-6 flex-1">
                <select id="language-toggle" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-brandBlue outline-none font-medium cursor-pointer p-2 shadow-sm">
                    <option value="en">English</option>
                    <option value="mr">मराठी</option>
                </select>
                <div class="flex items-center gap-3 border-l border-slate-200 pl-4 sm:pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider" data-translate="roleText">Farmer</p>
                        <p class="text-sm font-bold text-brandBlue" id="header-username">User</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 w-full max-w-3xl mx-auto pb-20">
            <h2 class="text-2xl font-bold text-slate-800 mb-6" data-translate="pageTitle">Settings</h2>

            <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                <div>
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2" data-translate="accountSettings">
                        <i class="fas fa-user-cog text-brandBlue"></i> Account Settings
                    </h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="font-semibold text-slate-700" data-translate="smsAlerts">SMS Alerts (Daily Slips)</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" checked class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brandBlue"></div>
                            </label>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="font-semibold text-slate-700" data-translate="emailNotif">Email Notifications (Weekly Payouts)</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brandBlue"></div>
                            </label>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2" data-translate="paySettings">
                        <i class="fas fa-wallet text-brandOrange"></i> Payment Settings
                    </h3>
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <div>
                            <p class="font-bold text-slate-800" data-translate="payFreq">Preferred Payout Frequency</p>
                        </div>
                        <select class="bg-white border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-brandBlue text-sm font-semibold transition-all shadow-sm">
                            <option>Weekly</option>
                            <option>Bi-Weekly</option>
                            <option>Monthly</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 flex justify-end border-t border-gray-100">
                    <button type="button" id="saveSettingsBtn" class="bg-brandBlue hover:bg-[#0D47A1] text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md flex items-center gap-2 transform hover:-translate-y-0.5">
                        <i class="fas fa-save"></i> <span data-translate="saveChanges">Save Changes</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const username = localStorage.getItem("username") || "Farmer";
        document.getElementById('header-username').innerText = username;
    });

    document.getElementById('saveSettingsBtn').addEventListener('click', function() {
        const btn = this;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        // Simulate save process since these specific toggles don't need a DB update yet
        setTimeout(() => {
            alert("Settings preferences saved successfully!");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }, 800);
    });

    function logout() {
        localStorage.removeItem("username");
        window.location.href = "login.html";
    }

    const translations = {
        "en": { headerTitle: "Washishti Farmer Settings", menuSection: "Farmer Menu", menuOther: "More", navHistory: "Milk History", navProfile: "Farmer Profile", navReports: "Reports & Analytics", navSettings: "Settings", navSupport: "Support", btnLogout: "Secure Logout", pageTitle: "Settings", accountSettings: "Account Settings", smsAlerts: "SMS Alerts (Daily Slips)", emailNotif: "Email Notifications (Weekly Payouts)", paySettings: "Payment Settings", payFreq: "Preferred Payout Frequency", saveChanges: "Save Changes", roleText: "Farmer" },
        "mr": { headerTitle: "वाशिष्ठी शेतकरी सेटिंग्ज", menuSection: "शेतकरी मेनू", menuOther: "इतर", navHistory: "दूध इतिहास", navProfile: "शेतकरी प्रोफाइल", navReports: "अहवाल आणि विश्लेषण", navSettings: "सेटिंग्ज", navSupport: "समर्थन", btnLogout: "सुरक्षित लॉगआउट", pageTitle: "सेटिंग्ज", accountSettings: "खाते सेटिंग्ज", smsAlerts: "एसएमएस अलर्ट (रोजच्या पावत्या)", emailNotif: "ईमेल सूचना (साप्ताहिक पेआउट)", paySettings: "पेमेंट सेटिंग्ज", payFreq: "पेमेंट मिळवण्याची वारंवारिता", saveChanges: "बदल जतन करा", roleText: "शेतकरी" }
    };
    
    document.getElementById('language-toggle').addEventListener('change', function(e) {
        const lang = e.target.value;
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
        });
    });
</script>
</body>
</html>
