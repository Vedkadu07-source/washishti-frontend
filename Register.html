<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - New Registration</title>
    <style>
        /* Shared Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .split-layout { display: flex; height: 100vh; width: 100vw; background-color: #ffffff; }
        .left-pane { flex: 1; background-color: #0d47a1; color: white; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow: hidden; }
        .left-pane::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(13, 71, 161, 0.45); z-index: 1; }
        .background-video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.05); min-width: 100%; min-height: 100%; z-index: 0; object-fit: cover; filter: blur(2px); }
        .brand-content { max-width: 450px; width: 100%; position: relative; z-index: 2; text-align: left; }
        .brand-content h1 { font-size: 2.8rem; font-weight: 700; line-height: 1.2; margin-bottom: 20px; text-shadow: 0px 2px 4px rgba(0,0,0,0.3); }
        .brand-content p { font-size: 1.05rem; line-height: 1.6; color: #e2e8f0; text-shadow: 0px 1px 3px rgba(0,0,0,0.3); }
        .right-pane { flex: 1; background-color: #ffffff; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .form-container { width: 100%; max-width: 420px; animation: fadeIn 0.6s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-header { text-align: center; margin-bottom: 25px; }
        .logo-circle { width: 70px; height: 70px; background-color: #f0f5fc; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px auto; }
        .logo-circle img { width: 45px; height: auto; }
        .form-header h2 { font-size: 1.8rem; color: #1a63c6; margin-bottom: 5px; font-weight: 700; }
        .form-header p { font-size: 0.9rem; color: #6b7280; }
        
        .input-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .input-group label { font-size: 0.9rem; font-weight: 600; color: #374151; }
        .input-field-wrapper { display: flex; align-items: center; background-color: #eff4fb; border-radius: 10px; padding: 10px 15px; border: 2px solid transparent; transition: all 0.3s ease; }
        .input-field-wrapper:focus-within { border-color: #1a63c6; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(26, 99, 198, 0.1); }
        .input-field-wrapper input, .input-field-wrapper select { flex: 1; border: none; background: transparent; font-size: 0.95rem; color: #111827; outline: none; width: 100%; }
        
        .btn { width: 100%; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .btn-primary { background-color: #1a63c6; color: #fff; border: none; margin-top: 5px; box-shadow: 0 4px 6px rgba(26, 99, 198, 0.2); }
        .btn-primary:hover { background-color: #144e9e; transform: translateY(-1px); }
        .btn-secondary { background-color: transparent; color: #1a63c6; border: 2px solid #1a63c6; margin-top: 15px; }
        
        @media (max-width: 768px) { .split-layout { flex-direction: column; height: auto; min-height: 100vh; } .left-pane { flex: none; height: 30vh; text-align: center; } .brand-content p { display: none; } .right-pane { flex: none; padding: 20px; border-radius: 20px 20px 0 0; margin-top: -20px; z-index: 10; } }
    </style>
</head>
<body>

    <div class="split-layout">
        <div class="left-pane">
            <video autoplay loop muted playsinline class="background-video">
                <source src="WhatsApp Video 2026-03-28 at 9.36.58 PM.mp4" type="video/mp4">
            </video>
            <div class="brand-content">
                <h1>वाशिष्टी डेअरी <br> Join Our Network</h1>
                <p>Register today to buy fresh milk, manage your franchise, or track your farm deposits.</p>
            </div>
        </div>

        <div class="right-pane">
            <div class="form-container">
                
                <div class="form-header">
                    <div class="logo-circle"><img src="washishti milk_logo 2.png" alt="Dairy Logo"></div>
                    <h2>Create an Account</h2>
                    <p>Enter your details to register.</p>
                </div>
                
                <form id="registerForm">
                    
                    <div class="input-group">
                        <div class="label-row"><label for="regUsername">Username</label></div>
                        <div class="input-field-wrapper"><input type="text" id="regUsername" placeholder="e.g. Ramesh123" required></div>
                    </div>
                    
                    <div class="input-group">
                        <div class="label-row"><label for="regPassword">Password</label></div>
                        <div class="input-field-wrapper"><input type="password" id="regPassword" placeholder="Create a password" required></div>
                    </div>

                    <div class="input-group">
                        <div class="label-row"><label for="regMobile">Mobile Number</label></div>
                        <div class="input-field-wrapper"><input type="tel" id="regMobile" placeholder="e.g. 9876543210" pattern="[0-9]{10}" required></div>
                    </div>

                    <div class="input-group">
                        <div class="label-row"><label for="regAddress">Full Address</label></div>
                        <div class="input-field-wrapper"><input type="text" id="regAddress" placeholder="e.g. 45 Green Avenue, Pune" required></div>
                    </div>

                    <div class="input-group">
                        <div class="label-row"><label for="regRole">Account Type (Role)</label></div>
                        <div class="input-field-wrapper">
                            <select id="regRole" required>
                                <option value="" disabled selected>Select your role...</option>
                                <option value="CUSTOMER">Online Customer</option>
                                <option value="FARMER">Farmer</option>
                                <option value="COLLECTION_CENTER">Collection Center</option>
                                <option value="FRANCHISE">Franchise Owner</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Register Account</button>
                    <button type="button" onclick="window.location.href='login.html'" class="btn btn-secondary">Back to Login</button>
                </form>

            </div>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault(); 
            
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const mobile = document.getElementById('regMobile').value.trim(); // Gather Mobile
            const address = document.getElementById('regAddress').value.trim(); // Gather Address
            const role = document.getElementById('regRole').value;

            const submitBtn = document.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "Creating Account...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('https://washishti-api.onrender.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Sending all 5 fields
                    body: JSON.stringify({ 
                        username: username, 
                        password: password, 
                        mobile: mobile,
                        address: address,
                        role: role 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Registration Successful! You can now log in.");
                    window.location.href = "login.html"; 
                } else {
                    alert("Registration Failed: " + (data.message || "Unknown error"));
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Server is offline. Ensure Java backend is running.");
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
