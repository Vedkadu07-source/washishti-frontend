<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - Support</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brandBlue: '#1565C0', brandOrange: '#febd69', bgGray: '#f8fafc' } }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>

<body class="text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gradient-to-b from-brandBlue to-[#0D47A1] text-white flex flex-col shadow-2xl z-20 hidden md:flex flex-shrink-0">
        <div class="h-20 flex items-center gap-3 px-6 border-b border-white/10 bg-black/5">
            <div class="bg-white p-1 rounded-full shadow-inner">
                <img src="washishti milk_logo 2.png" alt="Logo" class="w-8 h-8 object-contain" onerror="this.src='https://placehold.co/40x40?text=W'"> 
            </div>
            <span class="font-bold tracking-wide text-lg">Washishti Dairy</span>
        </div>

       <nav class="mt-6 px-4 space-y-2">
    <a href="franchise.html" class="flex items-center px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-lg transition-colors">
        <i class="fa-solid fa-boxes-stacked w-6"></i> Bulk Orders
    </a>
    <a href="FranchiseHistory.html" class="flex items-center px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-lg transition-colors">
        <i class="fa-solid fa-clock-rotate-left w-6"></i> My Orders
    </a>
    <a href="FranchiseReports.html" class="flex items-center px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-lg transition-colors">
        <i class="fa-solid fa-chart-pie w-6"></i> Report & Analysis
    </a>
    <a href="FranchiseSupport.html" class="flex items-center px-4 py-3 bg-blue-900 text-brandOrange font-semibold rounded-lg border-l-4 border-brandOrange">
        <i class="fa-solid fa-headset w-6"></i> Support
    </a>
    <a href="FranchiseSettings.html" class="flex items-center px-4 py-3 hover:bg-blue-800 hover:text-brandOrange rounded-lg transition-colors">
        <i class="fa-solid fa-gear w-6"></i> Settings
    </a>
   
</nav>
        <div class="p-4 mt-auto border-t border-white/10 bg-black/5">
            <button onclick="window.location.href='login.html';" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition-colors shadow-lg shadow-red-500/30">
                <i class="fas fa-sign-out-alt"></i> 
                <span data-translate="btnLogout">Secure Logout</span>
            </button>
            <p class="text-center text-xs text-white/50 mt-5 mb-2">&copy; 2026 Washishti</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 lg:px-8 z-10 flex-shrink-0 sticky top-0">
            <div class="flex items-center gap-4 flex-1">
                <div class="w-1 h-8 bg-brandBlue rounded-full hidden lg:block"></div>
                <h1 class="text-xl font-bold text-brandBlue italic tracking-tight hidden lg:block" data-translate="headerTitle">Washishti Support</h1>
            </div>
            
            <div class="flex items-center justify-end gap-4 flex-1">
                <select id="language-toggle" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-brandBlue outline-none font-medium cursor-pointer shadow-sm p-2">
                    <option value="en">English</option>
                    <option value="mr">मराठी</option>
                </select>
                
                <div class="flex items-center gap-3 border-l border-slate-200 pl-4 sm:pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider" data-translate="roleText">Farmer</p>
                        <p class="text-sm font-bold text-brandBlue" id="header-username">User</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-blue-100 border border-blue-200 flex items-center justify-center text-brandBlue shadow-sm">
                        <i class="fas fa-tractor"></i>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 w-full max-w-4xl mx-auto pb-20">
            
            <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                <div class="text-center mb-8">
                    <div class="inline-block p-4 bg-blue-50 text-brandBlue rounded-full mb-3"><i class="fa-solid fa-headset text-3xl"></i></div>
                    <h2 class="text-2xl font-bold text-gray-800" data-translate="needHelp">Need Help?</h2>
                    <p class="text-gray-500 mt-2" data-translate="helpDesc">Raise a ticket regarding payment disputes or quality check errors.</p>
                </div>

                <form id="supportForm" class="space-y-5 border-t border-slate-100 pt-6">
                    <h3 class="font-bold text-lg text-slate-800" data-translate="contactForm">Contact Support</h3>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="subject">Subject</label>
                        <input type="text" id="supportSubject" placeholder="e.g., Missing Payment" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brandBlue outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="desc">Description</label>
                        <textarea id="supportMessage" rows="4" placeholder="Describe your issue..." required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brandBlue outline-none resize-none transition-all"></textarea>
                    </div>
                    <button type="submit" id="submitSupportBtn" class="w-full bg-brandBlue hover:bg-[#0D47A1] text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md">
                        <span data-translate="sendBtn">Send Message</span>
                    </button>
                </form>
                
            </div>
        </div>
    </main>

<script>
    // Load Username
    document.addEventListener("DOMContentLoaded", function() {
        const username = localStorage.getItem("username") || "Farmer";
        document.getElementById('header-username').innerText = username;
    });

    // BACKEND CONNECTION: Send Support Ticket
    document.getElementById('supportForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Stop page reload

        const subject = document.getElementById('supportSubject').value.trim();
        const message = document.getElementById('supportMessage').value.trim();
        const username = localStorage.getItem("username") || "Guest";
        
        const btn = document.getElementById('submitSupportBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        btn.disabled = true;

        try {
            const response = await fetch('https://washishti-api.onrender.com/api/support', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    userRole: "FARMER", // Hardcoded because we are inside the Farmer portal
                    subject: subject,
                    message: message
                })
            });

            const data = await response.json();
            if (data.success) {
                alert(data.message);
                document.getElementById('supportSubject').value = ""; // Clear form
                document.getElementById('supportMessage').value = "";
            } else {
                alert("Failed to send message: " + data.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });

    // Translation Logic
    const translations = {
        "en": { headerTitle: "Washishti Support", menuSection: "Farmer Menu", menuOther: "More", navHistory: "Milk History", navProfile: "Farmer Profile", navReports: "Reports & Analytics", navSettings: "Settings", navSupport: "Support", btnLogout: "Secure Logout", needHelp: "Need Help?", helpDesc: "Raise a ticket regarding payment disputes or quality check errors.", contactForm: "Contact Support", subject: "Subject", desc: "Description", sendBtn: "Send Message", roleText: "Farmer" },
        "mr": { headerTitle: "वाशिष्ठी समर्थन", menuSection: "शेतकरी मेनू", menuOther: "इतर", navHistory: "दूध इतिहास", navProfile: "शेतकरी प्रोफाइल", navReports: "अहवाल आणि विश्लेषण", navSettings: "सेटिंग्ज", navSupport: "समर्थन", btnLogout: "सुरक्षित लॉगआउट", needHelp: "मदत हवी आहे?", helpDesc: "पेमेंट विवाद किंवा गुणवत्ता तपासणी त्रुटींसंबंधी तिकीट वाढवा.", contactForm: "समर्थनाशी संपर्क साधा", subject: "विषय", desc: "वर्णन", sendBtn: "संदेश पाठवा", roleText: "शेतकरी" }
    };

    document.getElementById('language-toggle').addEventListener('change', function(e) {
        const lang = e.target.value;
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
        });
    });
</script>
</body>
</html>
