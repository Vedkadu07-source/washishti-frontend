<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - Secure Portal</title>
    
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Full screen split layout */
        .split-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            background-color: #ffffff;
        }

        /* =========================================
           LEFT PANE (Video Background)
           ========================================= */
        .left-pane {
            flex: 1;
            background-color: #0d47a1; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative; 
            overflow: hidden; 
        }

        .left-pane::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 71, 161, 0.45); /* Slightly darker blue tint for better text contrast */
            z-index: 1; 
        }

        .background-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.05); 
            min-width: 100%;
            min-height: 100%;
            z-index: 0; 
            object-fit: cover; 
            filter: blur(0.5px); 
        }

        .brand-content {
            max-width: 450px;
            width: 100%;
            position: relative; 
            z-index: 2; 
            text-align: left;
        }

        .brand-icon-large {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .brand-content h1 {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.3); /* Added shadow for readability over video */
        }

        .brand-content p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e2e8f0; 
            text-shadow: 0px 1px 3px rgba(0,0,0,0.3);
        }

        /* =========================================
           RIGHT PANE (New Form Design)
           ========================================= */
        .right-pane {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .form-container {
            width: 100%;
            max-width: 420px; 
            animation: fadeIn 0.6s ease-in-out; /* Smooth entrance animation */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Styling */
        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: #f0f5fc; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Subtle shadow */
        }

        .logo-circle img {
            width: 50px; 
            height: auto;
        }

        .form-header h2 {
            font-size: 1.8rem;
            color: #1a63c6; 
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-header p {
            font-size: 0.95rem;
            color: #6b7280;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 20px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .input-group label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #374151; 
        }

        .forgot-link {
            font-size: 0.85rem;
            color: #1a63c6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #144e9e;
            text-decoration: underline;
        }

        .input-field-wrapper {
            display: flex;
            align-items: center;
            background-color: #eff4fb; 
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid transparent; /* Changed to 2px for better highlight */
            transition: all 0.3s ease;
        }

        .input-field-wrapper:focus-within {
            border-color: #1a63c6; 
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 99, 198, 0.1); /* Glow effect on focus */
        }

        .input-icon {
            width: 20px;
            height: 20px;
            fill: #9ca3af; 
            margin-right: 12px;
            display: flex;
            align-items: center;
            transition: fill 0.3s ease;
        }

        .input-field-wrapper:focus-within .input-icon {
            fill: #1a63c6; /* Icon turns blue when focused */
        }

        .input-field-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: #111827;
            outline: none;
        }

        .input-field-wrapper input::placeholder {
            color: #9ca3af;
        }

        /* Button Styling */
        .btn {
            width: 100%;
            border-radius: 10px; 
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #1a63c6;
            color: #fff;
            border: none;
            gap: 10px; 
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(26, 99, 198, 0.2);
        }

        .btn-primary:hover {
            background-color: #144e9e;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px rgba(26, 99, 198, 0.3);
        }

        /* Secondary Button (For Registration) */
        .btn-secondary {
            background-color: transparent;
            color: #1a63c6;
            border: 2px solid #1a63c6;
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background-color: #eff4fb;
        }

        .register-prompt {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #6b7280;
        }

        .register-prompt p {
            margin-bottom: 15px;
        }

        /* =========================================
           MOBILE RESPONSIVENESS
           ========================================= */
        @media (max-width: 768px) {
            .split-layout {
                flex-direction: column; /* Stack vertically */
                height: auto;
                min-height: 100vh;
            }
            
            .left-pane {
                flex: none;
                height: 35vh; /* Video takes up top 35% of screen */
                padding: 20px;
                text-align: center;
            }

            .brand-content {
                text-align: center;
            }

            .brand-icon-large {
                font-size: 2.5rem;
                margin-bottom: 10px;
            }

            .brand-content h1 {
                font-size: 2rem;
                margin-bottom: 10px;
            }

            .brand-content p {
                display: none; /* Hide paragraph on mobile to save space */
            }

            .right-pane {
                flex: none;
                padding: 30px 20px;
                border-radius: 20px 20px 0 0; /* Rounds the top corners */
                margin-top: -20px; /* Pulls form up over the video slightly */
                z-index: 10;
            }
            .h1{
                color:blue;
            }
        }
    </style>
</head>
<body>

    <div class="split-layout">
        <div class="left-pane">
            <video autoplay loop muted playsinline class="background-video">
                <source src="WhatsApp Video 2026-03-28 at 9.36.58 PM.mp4" type="video/mp4">
            </video>
            <div class="brand-content">
                
                <h1>वाशिष्टी डेअरी <br> दूध आणि दुग्धजन्य पदार्थ</h1>
                <p>Welcome to the official dairy portal. Log in to easily manage your milk records, view digital receipts, and stay updated.</p>
            </div>
        </div>

        <div class="right-pane">
            <div class="form-container">
                
                <div class="form-header">
                    <div class="logo-circle">
                        <img src="washishti milk_logo 2.png" alt="Dairy Logo">
                    </div>
                    <h2>Welcome Back</h2>
                    <p>Please enter your credentials to access the portal.</p>
                </div>
                
                <form id="loginForm">
                    
                    <div class="input-group">
                        <div class="label-row">
                            <label for="userId">Username / ID</label>
                        </div>
                        <div class="input-field-wrapper">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                                </svg>
                            </span>
                            <input type="text" id="userId" placeholder="e.g. Suresh" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <div class="label-row">
                            <label for="password">Password</label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        <div class="input-field-wrapper">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
                                </svg>
                            </span>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Secure Sign In &rarr;</button>
                    
                    <div class="register-prompt">
                        <p>Don't have an account?</p>
                        <button type="button" id="registerBtn" class="btn btn-secondary">New Registration</button>
                    </div>
                    
                </form>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const registerBtn = document.getElementById("registerBtn");

            // Handle Login Submit
            loginForm.addEventListener("submit", async (e) => {
                e.preventDefault(); 
                
                const userId = document.getElementById("userId").value.trim();
                const password = document.getElementById("password").value;

                // Change button text to show loading state
                const submitBtn = loginForm.querySelector('.btn-primary');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = "Authenticating...";
                submitBtn.disabled = true;
                
                try {
                    // API Call to your Spring Boot Backend
                    // FIXED: Changed /api/users/login to /api/login to match UserController
                    const response = await fetch('https://washishti-api.onrender.com/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            username: userId, 
                            password: password 
                        })
                    });

                    if (response.ok) {
                        // Success! Parse the user data
                        const data = await response.json();
                        
                        // Save session data to localStorage so other pages know who is logged in
                        localStorage.setItem("username", data.username || userId);
                        localStorage.setItem("userRole", data.role);
                        localStorage.setItem("loggedInUser", data.id || userId); 

                        // Route the user to the correct dashboard based on their role
                        const role = data.role.toUpperCase();
                        
                        if (role === 'ADMIN') {
                            window.location.href = 'admin_master.html';
                        } else if (role === 'FRANCHISE') {
                            window.location.href = 'franchise.html';
                        } else if (role === 'COLLECTOR' || role === 'COLLECTION_CENTER') {
                            window.location.href = 'collection.html';
                        } else if (role === 'FARMER') {
                            window.location.href = 'Farmers.html';
                        } 
                        else if (role === 'Admin') {
                            window.location.href = 'admin_master.html';
                        } else {
                            window.location.href = 'OnlineCustomers.html'; // Default to Online Customer
                        }
                    } else {
                        // Failed login (Wrong password or username)
                        alert("Login Failed: Invalid Username or Password");
                        submitBtn.innerHTML = originalText;
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    console.error('Connection Error:', error);
                    alert("Cannot connect to server. Please ensure your Java backend is running.");
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });

            // Handle Registration Click
            registerBtn.addEventListener("click", () => {
                window.location.href = "register.html";
            });
        });
    </script>
</body>
</html>
