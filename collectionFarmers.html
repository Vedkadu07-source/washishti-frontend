<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washishti Dairy - Farmer Management</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>

<body class="text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gradient-to-b from-[#1565C0] to-[#0D47A1] text-white flex flex-col shadow-2xl z-20 hidden md:flex flex-shrink-0">
        <div class="h-20 flex items-center gap-3 px-6 border-b border-white/10 bg-black/5">
            <div class="bg-white p-1 rounded-full shadow-inner">
                <img src="washishti milk_logo 2.png" alt="Logo" class="w-8 h-8 object-contain">
            </div>
            <span class="font-bold tracking-wide text-lg">Washishti Dairy</span>
        </div>
        
        <nav class="mt-6 px-4 space-y-2 flex-1 overflow-y-auto">
            <a href="collection.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-flask w-6 text-center"></i> <span data-translate="navCollection">Milk Collection</span>
            </a>
            
            <a href="collectionFarmers.html" class="flex items-center px-4 py-3 bg-blue-900 text-white font-bold rounded-lg shadow-inner">
                <i class="fa-solid fa-users w-6 text-center"></i> <span data-translate="navFarmers">Farmer Mgt</span>
            </a>
            
            <a href="collection_reports.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-chart-line w-6 text-center"></i> <span data-translate="navReports">Report & Analysis</span>
            </a>
            <a href="collection_support.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-headset w-6 text-center"></i> <span data-translate="navSupport">Support</span>
            </a>
            <a href="collection_settings.html" class="flex items-center px-4 py-3 hover:bg-blue-800 text-white/80 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-gear w-6 text-center"></i> <span data-translate="navSettings">Settings</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-white/10 bg-black/5 text-center text-xs text-white/50">
            &copy; 2026 Washishti
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 lg:px-8 z-10 flex-shrink-0 sticky top-0">
            <div class="flex items-center gap-4">
                <div class="w-1 h-8 bg-[#1565C0] rounded-full hidden sm:block"></div>
                <h1 class="text-lg font-bold text-[#1565C0] italic tracking-tight hidden sm:block" data-translate="companyName">Washishti Milk & Milk Products Pvt. Ltd.</h1>
                <button class="md:hidden text-slate-500 text-2xl"><i class="fas fa-bars"></i></button>
            </div>
            
            <div class="flex items-center gap-4 sm:gap-6">
                <select id="language-toggle" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-[#1565C0] focus:border-[#1565C0] block p-2 outline-none font-medium cursor-pointer shadow-sm">
                    <option value="en">English</option>
                    <option value="mr">मराठी (Marathi)</option>
                </select>
                
                <div class="flex items-center gap-3 border-l border-slate-200 pl-4 sm:pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operator</p>
                        <p class="text-sm font-bold text-slate-700" id="header-username">Center #42</p>
                    </div>
                    <button onclick="localStorage.removeItem('loggedInUser'); window.location.href='login.html';" class="w-10 h-10 rounded-full bg-red-50 hover:bg-red-100 border border-red-200 flex items-center justify-center text-red-500 transition-colors shadow-sm" title="Logout">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 w-full max-w-[1600px] mx-auto pb-32">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-slate-800" data-translate="pageTitle">Registered Farmers</h2>
                
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl border-y border-r border-l-4 border-l-[#1565C0] border-y-slate-200 border-r-slate-200 shadow-sm flex items-center justify-between transition-transform hover:-translate-y-1">
                    <div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider" data-translate="statTotal">Total Farmers</p>
                        <h3 class="text-3xl font-black text-slate-800 mt-1" id="stat-total-farmers">0</h3>
                    </div>
                    <div class="text-[#1565C0] opacity-20 text-4xl"><i class="fas fa-users"></i></div>
                </div>
                </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-bold" data-translate="colId">Farmer ID</th>
                            <th class="p-4 font-bold" data-translate="colName">Full Name</th>
                            <th class="p-4 font-bold" data-translate="colPhone">Phone</th>
                            <th class="p-4 font-bold" data-translate="colStatus">Status</th>
                        </tr>
                    </thead>
                    <tbody id="farmer-list" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="4" class="p-8 text-center text-gray-500">Loading farmers...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    // FETCH DATA
    document.addEventListener("DOMContentLoaded", async function() {
        document.getElementById('header-username').innerText = localStorage.getItem("username") || "Center Operator";
        
        try {
            const res = await fetch('https://washishti-api.onrender.com/api/users/farmers');
            if(res.ok) {
                const farmers = await res.json();
                document.getElementById('stat-total-farmers').innerText = farmers.length;
                
                const tbody = document.getElementById('farmer-list');
                tbody.innerHTML = '';
                if(farmers.length === 0) tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center">No farmers found.</td></tr>`;
                
                farmers.forEach(farmer => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="p-4 font-bold text-[#1565C0]">${farmer.username}</td>
                            <td class="p-4 font-semibold text-slate-700">${farmer.username}</td>
                            <td class="p-4 text-gray-600">${farmer.mobile || 'N/A'}</td>
                            <td class="p-4"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide">Active</span></td>
                        </tr>
                    `;
                });
            }
        } catch(e) {
            console.error("Fetch error:", e);
        }
    });

    const translations = {
        "en": {
            companyName: "Washishti Milk & Milk Products Pvt. Ltd.",
            navCollection: "Milk Collection", 
            navFarmers: "Farmer Mgt", 
            navReports: "Report & Analysis", 
            navSupport: "Support", 
            navSettings: "Settings", 
            pageTitle: "Registered Farmers", 
            btnAdd: "Add New Farmer", 
            statTotal: "Total Farmers", 
            colId: "Farmer ID", 
            colName: "Full Name", 
            colPhone: "Phone", 
            colStatus: "Status"
        },
        "mr": {
            companyName: "वाशिष्ठी दूध आणि दुग्धजन्य पदार्थ प्रा. लि.",
            navCollection: "दूध संकलन", 
            navFarmers: "शेतकरी व्यवस्थापन", 
            navReports: "अहवाल आणि विश्लेषण", 
            navSupport: "समर्थन", 
            navSettings: "सेटिंग्ज", 
            pageTitle: "नोंदणीकृत शेतकरी", 
            btnAdd: "नवीन शेतकरी जोडा", 
            statTotal: "एकूण शेतकरी", 
            colId: "शेतकरी आयडी", 
            colName: "संपूर्ण नाव", 
            colPhone: "फोन", 
            colStatus: "स्थिती"
        }
    };

    document.getElementById('language-toggle').addEventListener('change', function(e) {
        const lang = e.target.value;
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
        });
    });
</script>
</body>
</html>
